name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_ANALYTICS_ENDPOINT: https://analytics.sidethreadgpt.com/api/extension-events

      - name: Rename zip with version
        run: mv release/release.zip release/${{ github.ref_name }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: release/${{ github.ref_name }}.zip
